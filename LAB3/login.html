<!DOCTYPE html>
<!-- Internet Programming LAB3 | 학번: 2021147557 | 이름: 이재근 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 인프밍 영화 정보 사이트</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="page">

        <!-- 공통 헤더 -->
        <header class="header">
            <div class="header-spacer"></div>
            <h1 class="header-text">인프밍 영화 정보 사이트입니다.</h1>
        </header>

        <!-- 공통 네비게이션 -->
        <nav class="navigation">
            <a href="index.html" class="nav-item">메인페이지</a>
            <a href="login.html" class="nav-item active">로그인</a>
            <a href="signup.html" class="nav-item">회원가입</a>
        </nav>

        <!-- 로그인 폼 -->
        <div class="form-box login-box">
            <form action="signup.html" method="get">
                <div class="form-row">
                    <label for="userid" class="field-label">아이디 :</label>
                    <input type="text" id="userid" name="userid" class="field-input"
                           autofocus placeholder="아이디 입력" autocomplete="username" required>
                </div>

                <div class="form-row">
                    <label for="password" class="field-label">비밀번호 :</label>
                    <input type="password" id="password" name="password" class="field-input"
                           placeholder="비밀번호 입력" autocomplete="current-password" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-submit">Login</button>
                    <button type="reset" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
