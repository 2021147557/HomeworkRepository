<!DOCTYPE html>
<!-- Internet Programming LAB3 | 학번: 2021147557 | 이름: 이재근 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 인프밍 영화 정보 사이트</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="page">

        <!-- 공통 헤더 -->
        <header class="header">
            <div class="header-spacer"></div>
            <h1 class="header-text">인프밍 영화 정보 사이트입니다.</h1>
        </header>

        <!-- 공통 네비게이션 -->
        <nav class="navigation">
            <a href="index.html" class="nav-item">메인페이지</a>
            <a href="login.html" class="nav-item">로그인</a>
            <a href="signup.html" class="nav-item active">회원가입</a>
        </nav>

        <!-- 회원가입 폼 -->
        <div class="form-box">
            <form action="login.html" method="get">
                <div class="form-row">
                    <label for="name" class="field-label">이름 :</label>
                    <input type="text" id="name" name="name" class="field-input"
                           autofocus placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-row">
                    <label for="birthday" class="field-label">생일 :</label>
                    <input type="date" id="birthday" name="birthday" class="field-input" required>
                </div>

                <div class="form-row">
                    <span class="field-label">성별 :</span>
                    <span class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> 남성</label>
                        <label><input type="radio" name="gender" value="female"> 여성</label>
                    </span>
                </div>

                <div class="form-row">
                    <label for="grade" class="field-label">학년 :</label>
                    <input type="number" id="grade" name="grade" class="field-input"
                           min="1" max="4" step="1" required>
                </div>

                <div class="form-row">
                    <label for="userid" class="field-label">아이디 :</label>
                    <input type="text" id="userid" name="userid" class="field-input"
                           placeholder="아이디를 입력하세요" autocomplete="username" required>
                </div>

                <div class="form-row">
                    <label for="password" class="field-label">비밀번호 :</label>
                    <input type="password" id="password" name="password" class="field-input"
                           placeholder="비밀번호를 입력하세요" autocomplete="new-password" required>
                </div>

                <div class="form-row">
                    <label for="email" class="field-label">이메일 :</label>
                    <input type="email" id="email" name="email" class="field-input"
                           placeholder="example@domain.com" autocomplete="email" required>
                </div>

                <div class="form-row">
                    <label for="question" class="field-label">보안 질문 :</label>
                    <select id="question" name="question" class="field-input" required>
                        <option value="">질문을 선택하세요</option>
                        <option value="pet">어릴 때 키우던 반려동물 이름은?</option>
                        <option value="school">졸업한 초등학교 이름은?</option>
                        <option value="movie">가장 좋아하는 영화 제목은?</option>
                        <option value="city">태어난 도시는?</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="answer" class="field-label">답변 :</label>
                    <input type="text" id="answer" name="answer" class="field-input"
                           placeholder="답변을 입력하세요" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-submit">Signup</button>
                    <button type="reset" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
