<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - Internet Programming Movie Site</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1 class="site-title">Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <div class="nav-links">
        <a href="login.html">로그인</a> | <a href="signup.html">회원가입</a>
    </div>

    <div class="form-box login-box">
        <form action="signup.html" method="get">
            <div class="form-row">
                <label for="userid" class="field-label">아이디 :</label>
                <input type="text" id="userid" name="userid" class="field-input"
                       autofocus placeholder="아이디 입력" autocomplete="username" required>
            </div>

            <div class="form-row">
                <label for="password" class="field-label">비밀번호 :</label>
                <input type="password" id="password" name="password" class="field-input"
                       placeholder="비밀번호 입력" autocomplete="current-password" required>
            </div>

            <div class="button-row">
                <button type="submit" class="btn-submit">Login</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>
        </form>
    </div>
</body>
</html>
